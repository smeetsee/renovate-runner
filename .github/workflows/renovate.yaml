name: Renovate

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository URL, without credentials'
        required: true
        default: ''
      environment:
        description: 'Comma-separated list of environment variables to set, written as KEY=VALUE pairs'
        required: false
        default: ''

env: {}
permissions: {}
  
jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set environment variables
        env:
          ENVIRONMENT_INPUT: ${{ inputs.environment }}
        run: |
          IFS=',' read -ra vars <<< "$ENVIRONMENT_INPUT"
          for var in "${vars[@]}"; do
            [ -n "$var" ] || continue
            key=${var%%=*}
            value=${var#*=}

            case "$key" in
              *TOKEN*|*SECRET*|*PASSWORD*|*PRIVATE*|*KEY*)
                echo "::warning::Skipping sensitive variable '$key' from inputs.environment; configure it as a GitHub repository secret instead."
                ;;
              *)
                printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
                ;;
            esac
          done
      - name: Checkout repository
        run: |
          repo_url="${{ inputs.repository }}"
          git clone "https://oauth2:${{ secrets.RENOVATE_TOKEN }}@${repo_url#https://}" .
      - name: Checkout local action
        uses: actions/checkout@v7
        with:
          path: ./github-repo
      - name: Run Renovate
        uses: ./github-repo/actions/renovate
        with:
          github-token: ${{ github.token }}

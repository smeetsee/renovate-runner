name: Renovate

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository URL, without credentials'
        required: true
        default: ''
      environment:
        description: 'JSON object of environment variables to set, written as key/value pairs'
        required: false
        default: ''

env: {}
permissions: {}
  
jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set environment variables
        env:
          ENVIRONMENT_INPUT: ${{ inputs.environment }}
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          import re

          environment_input = os.environ["ENVIRONMENT_INPUT"]
          environment = json.loads(environment_input) if environment_input else {}
          skip_pattern = re.compile(r'^RENOVATE_.*(?:TOKEN|SECRET|PASSWORD|PRIVATE|KEY).*$')

          for key, value in environment.items():
              if key == 'RENOVATE_GITHUB_COM_TOKEN' or skip_pattern.match(key):
                  print(f"::warning::Skipping sensitive variable '{key}' from inputs.environment; configure it as a GitHub repository secret instead.")
                  continue
              print(f"{key}={value}")
          PY
      - name: Checkout repository
        run: |
          repo_url="${{ inputs.repository }}"
          git clone "https://oauth2:${{ secrets.RENOVATE_TOKEN }}@${repo_url#https://}" .
      - name: Checkout local action
        uses: actions/checkout@v7
        with:
          path: ./github-repo
      - name: Run Renovate
        uses: ./github-repo/actions/renovate
        with:
          github-token: ${{ github.token }}

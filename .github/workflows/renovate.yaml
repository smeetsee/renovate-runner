name: Renovate

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository URL, without credentials'
        required: true
        default: ''
      environment:
        description: 'Comma-separated list of environment variables to set, written as KEY=VALUE pairs'
        required: false
        default: ''

env: {}
  
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Set environment variables
        run: |
          IFS=',' read -ra vars <<< "${{ inputs.environment }}"
          for var in "${vars[@]}"; do
            [ -n "$var" ] || continue
            key=${var%%=*}
            value=${var#*=}

            case "$key" in
              *TOKEN*|*SECRET*|*PASSWORD*|*PRIVATE*|*KEY*)
                echo "::add-mask::$value"
                ;;
            esac

            printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
          done
      - name: Checkout repository
        run: |
          : "${RENOVATE_TOKEN:?RENOVATE_TOKEN is required}"
          repo_url="${{ inputs.repository }}"
          git clone "https://oauth2:${RENOVATE_TOKEN}@${repo_url#https://}" renovate-repo
      - name: Move Renovate config
        run: |
          mv renovate-repo/renovate.json .
      - name: Run Renovate
        uses: ./actions/renovate
        with:
          github-token: ${{ github.token }}
